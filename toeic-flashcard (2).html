<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="TOEIC보카">
<meta name="theme-color" content="#080D1A">
<title>TOEIC 보카 — DAY 1~30</title>
<style>
:root{
  --bg:#080D1A; --s1:#0F1729; --s2:#182040; --s3:#1E2A50;
  --border:#2A3660; --accent:#00C8FF; --accent2:#0077AA;
  --green:#00E096; --red:#FF3B5C; --gold:#FFB300;
  --txt:#E4EAF8; --txt2:#7B8FB5; --txt3:#3E4E72;
  --r:env(safe-area-inset-right,0px); --l:env(safe-area-inset-left,0px);
  --t:env(safe-area-inset-top,0px); --b:env(safe-area-inset-bottom,0px);
}
*{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent}
html,body{height:100%;overflow:hidden;background:var(--bg);color:var(--txt);
  font-family:-apple-system,BlinkMacSystemFont,'SF Pro Display','Helvetica Neue',sans-serif;
  font-size:14px}

/* ── SCREENS ── */
.scr{display:none;flex-direction:column;height:100vh;height:-webkit-fill-available}
.scr.on{display:flex}

/* ── HOME ── */
#home{overflow-y:auto;padding:calc(var(--t)+6px) 14px calc(var(--b)+10px)}

.hdr{display:flex;align-items:center;justify-content:space-between;padding:6px 0 10px}
.logo{display:flex;align-items:center;gap:8px}
.logo-box{width:32px;height:32px;border-radius:9px;
  background:linear-gradient(135deg,#0055FF,var(--accent));
  display:flex;align-items:center;justify-content:center;
  font-size:15px;font-weight:900;color:#fff}
.logo-title{font-size:15px;font-weight:800;letter-spacing:-.4px}
.logo-sub{font-size:10px;color:var(--txt2);margin-top:1px}
.streak{display:flex;align-items:center;gap:4px;
  background:rgba(255,179,0,.1);border:1px solid rgba(255,179,0,.2);
  border-radius:16px;padding:4px 9px;font-size:12px;font-weight:700;color:var(--gold)}

/* stat bar */
.stats{display:grid;grid-template-columns:1fr 1fr 1fr;gap:1px;
  background:var(--border);border:1px solid var(--border);border-radius:12px;
  overflow:hidden;margin-bottom:8px}
.stat{background:var(--s1);padding:10px 0;text-align:center}
.stat-v{font-size:20px;font-weight:800;color:var(--accent);letter-spacing:-1px}
.stat-l{font-size:10px;color:var(--txt3);margin-top:1px;font-weight:500}

/* daily bar */
.daily{background:var(--s1);border:1px solid var(--border);border-radius:11px;
  padding:10px 12px;margin-bottom:8px}
.daily-row{display:flex;justify-content:space-between;align-items:center;margin-bottom:7px}
.daily-lbl{font-size:11px;font-weight:600;color:var(--txt2)}
.daily-cnt{font-size:11px;font-weight:700;color:var(--accent)}
.track{height:5px;background:var(--s3);border-radius:3px;overflow:hidden}
.fill{height:100%;background:linear-gradient(90deg,var(--accent2),var(--accent));
  border-radius:3px;transition:width .5s cubic-bezier(.4,0,.2,1)}
.gseg{padding:3px 7px;border:1px solid var(--border);border-radius:6px;
  font-size:10px;font-weight:700;color:var(--txt3);cursor:pointer;
  background:var(--s2);transition:all .12s}
.gseg.active{background:var(--accent2);border-color:var(--accent);color:#fff}
.gseg:active{opacity:.7}

/* review btn */
.rev-btn{width:100%;padding:11px;background:var(--s1);border:1px solid var(--border);
  border-radius:11px;color:var(--txt);font-size:13px;font-weight:600;cursor:pointer;
  margin-bottom:7px;display:flex;align-items:center;justify-content:center;gap:7px}
.rev-btn:active{background:var(--s2)}
.badge{background:var(--red);color:#fff;font-size:10px;font-weight:700;
  padding:2px 7px;border-radius:9px}

/* study-all btn */
.all-btn{width:100%;padding:12px;background:linear-gradient(135deg,#0044DD,var(--accent));
  border:none;border-radius:11px;color:#fff;font-size:14px;font-weight:700;
  cursor:pointer;margin-bottom:10px;letter-spacing:-.2px}
.all-btn:active{opacity:.85}

/* 초기화 버튼 */
.reset-btn{width:100%;padding:10px;background:transparent;
  border:1px solid rgba(255,59,92,.3);border-radius:11px;
  color:rgba(255,59,92,.7);font-size:12px;font-weight:600;
  cursor:pointer;margin-bottom:10px;letter-spacing:-.1px}
.reset-btn:active{background:rgba(255,59,92,.08)}

/* section title */
.sec{font-size:10px;font-weight:700;color:var(--txt3);letter-spacing:1.2px;
  text-transform:uppercase;margin:8px 0 7px}

/* category cards */
.cat-grid{display:grid;grid-template-columns:1fr 1fr;gap:7px;padding-bottom:6px}
.cc{background:var(--s1);border:1px solid var(--border);border-radius:11px;
  padding:10px 11px 9px;cursor:pointer;position:relative;overflow:hidden;
  transition:background .12s,transform .12s}
.cc:active{transform:scale(.97);background:var(--s2)}
.cc::before{content:'';position:absolute;top:0;left:0;width:3px;height:100%;border-radius:3px 0 0 3px}
.cc.c0::before{background:#FF6B35}
.cc.c1::before{background:#FFB300}
.cc.c2::before{background:#00E096}
.cc.c3::before{background:#9B59B6}
.cc.c4::before{background:#00C8FF}
.cc-tag{font-size:9px;font-weight:600;color:var(--txt3);letter-spacing:.5px;margin-bottom:2px}
.cc-name{font-size:12px;font-weight:700;margin-bottom:6px;line-height:1.2}
.cc-row{display:flex;align-items:center;gap:6px}
.cc-trk{flex:1;height:3px;background:var(--s3);border-radius:2px;overflow:hidden}
.cc-bar{height:100%;border-radius:2px;transition:width .3s}
.cc.c0 .cc-bar{background:#FF6B35}
.cc.c1 .cc-bar{background:#FFB300}
.cc.c2 .cc-bar{background:#00E096}
.cc.c3 .cc-bar{background:#9B59B6}
.cc.c4 .cc-bar{background:#00C8FF}
.cc-cnt{font-size:9px;color:var(--txt3);white-space:nowrap}

/* ── STUDY ── */
#study{padding:0;overflow:hidden}

.s-hdr{display:flex;align-items:center;gap:10px;
  padding:calc(var(--t)+6px) 14px 8px;flex-shrink:0}
.back{width:32px;height:32px;background:var(--s1);border:1px solid var(--border);
  border-radius:9px;display:flex;align-items:center;justify-content:center;
  font-size:20px;color:var(--txt2);cursor:pointer;flex-shrink:0;line-height:1}
.back:active{background:var(--s2)}
.s-meta{flex:1;min-width:0}
.s-name{font-size:13px;font-weight:700;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.s-prog{font-size:11px;color:var(--txt3);margin-top:1px}
.s-streak{font-size:11px;font-weight:700;color:var(--green);
  background:rgba(0,224,150,.08);border:1px solid rgba(0,224,150,.15);
  border-radius:16px;padding:3px 9px;white-space:nowrap}

.prog-bar{height:2px;background:var(--s2);flex-shrink:0}
.prog-fill{height:100%;background:linear-gradient(90deg,var(--accent2),var(--accent));
  transition:width .4s cubic-bezier(.4,0,.2,1)}

/* card area */
.card-wrap{flex:1;display:flex;align-items:center;justify-content:center;
  padding:8px 16px;position:relative;overflow:hidden}

.card{width:100%;max-width:380px;perspective:1200px;cursor:pointer}
.card-inner{position:relative;transform-style:preserve-3d;
  transition:transform .42s cubic-bezier(.4,0,.2,1)}
.card-inner.flip{transform:rotateY(180deg)}

.face{width:100%;backface-visibility:hidden;-webkit-backface-visibility:hidden;
  background:var(--s1);border:1px solid var(--border);border-radius:18px;
  display:flex;flex-direction:column;align-items:center;justify-content:center;
  min-height:210px;padding:22px 20px;
  box-shadow:0 16px 48px rgba(0,0,0,.4)}
.face-back{position:absolute;top:0;left:0;width:100%;transform:rotateY(180deg)}

.day-tag{font-size:9px;font-weight:700;color:var(--txt3);letter-spacing:1px;
  background:var(--s2);padding:3px 9px;border-radius:5px;margin-bottom:10px;
  text-transform:uppercase}
.word{font-size:clamp(24px,7vw,36px);font-weight:800;letter-spacing:-1px;
  text-align:center;line-height:1.1;margin-bottom:4px}
.pos{font-size:11px;color:var(--txt3);margin-bottom:10px;font-weight:500}
.tap-hint{font-size:10px;color:var(--txt3);display:flex;align-items:center;gap:4px}

/* ── 타이머 ── */
.timer-wrap{width:100%;margin-bottom:12px}
.timer-track{height:4px;background:var(--s3);border-radius:3px;overflow:hidden}
.timer-fill{height:100%;border-radius:3px;
  background:linear-gradient(90deg,var(--green),var(--accent));
  transition:width .1s linear;width:100%}
.timer-fill.danger{background:linear-gradient(90deg,#FF6B00,var(--red))}
.timer-num{font-size:10px;font-weight:700;color:var(--txt3);text-align:right;margin-top:3px;
  letter-spacing:.5px;transition:color .3s}
.timer-num.danger{color:var(--red)}

/* 타이머 설정 패널 */
.timer-cfg{display:flex;align-items:center;gap:7px;
  background:var(--s1);border:1px solid var(--border);border-radius:10px;
  padding:8px 12px;margin:0 14px 7px}
.timer-cfg-lbl{font-size:11px;color:var(--txt2);font-weight:600;flex:1}
.timer-seg{display:flex;gap:4px}
.tseg{padding:4px 9px;border:1px solid var(--border);border-radius:7px;
  font-size:11px;font-weight:700;color:var(--txt2);cursor:pointer;
  background:var(--s2);transition:all .12s}
.tseg.active{background:var(--accent2);border-color:var(--accent);color:#fff}
.tseg:active{opacity:.7}
.tauto-toggle{display:flex;align-items:center;gap:6px;
  font-size:11px;color:var(--txt2);cursor:pointer;padding:4px 0}
.toggle-box{width:30px;height:17px;background:var(--s3);border-radius:9px;
  position:relative;transition:background .2s;flex-shrink:0}
.toggle-box::after{content:'';position:absolute;top:2px;left:2px;
  width:13px;height:13px;background:#fff;border-radius:50%;
  transition:transform .2s}
.toggle-box.on{background:var(--accent2)}
.toggle-box.on::after{transform:translateX(13px)}

.meaning{font-size:clamp(15px,5vw,22px);font-weight:700;color:var(--accent);
  text-align:center;line-height:1.4;margin-bottom:8px;letter-spacing:-.3px}
.ivl-lbl{font-size:10px;color:var(--txt3);margin-top:4px}

.spk-btn{position:absolute;top:12px;right:12px;width:30px;height:30px;
  background:var(--s2);border:1px solid var(--border);border-radius:8px;
  display:flex;align-items:center;justify-content:center;cursor:pointer;font-size:14px;z-index:5}
.spk-btn:active{background:var(--s3)}

/* answer btns */
.ans{padding:10px 14px calc(var(--b)+12px);display:grid;
  grid-template-columns:1fr 1fr;gap:9px;flex-shrink:0}
.ans.hide{visibility:hidden;pointer-events:none}
.abtn{padding:13px;border:none;border-radius:12px;font-size:15px;font-weight:700;
  cursor:pointer;transition:transform .1s,opacity .1s}
.abtn:active{transform:scale(.96);opacity:.85}
.abtn small{display:block;font-size:10px;font-weight:500;opacity:.65;margin-top:2px}
.again{background:rgba(255,59,92,.1);border:1.5px solid rgba(255,59,92,.3);color:var(--red)}
.good{background:rgba(0,224,150,.1);border:1.5px solid rgba(0,224,150,.3);color:var(--green)}

/* ── DONE ── */
#done{align-items:center;justify-content:center;
  padding:calc(var(--t)+16px) 20px calc(var(--b)+16px)}
.done-ico{font-size:52px;margin-bottom:12px}
.done-t{font-size:22px;font-weight:800;margin-bottom:4px;letter-spacing:-.4px}
.done-s{font-size:13px;color:var(--txt2);text-align:center;margin-bottom:20px}
.done-box{width:100%;max-width:320px;background:var(--s1);border:1px solid var(--border);
  border-radius:14px;padding:14px 18px;margin-bottom:16px}
.drow{display:flex;justify-content:space-between;align-items:center;
  padding:8px 0;border-bottom:1px solid var(--border)}
.drow:last-child{border:none}
.dlbl{font-size:12px;color:var(--txt2)}
.dval{font-size:14px;font-weight:700}
.home-btn{width:100%;max-width:320px;padding:13px;
  background:linear-gradient(135deg,#0044DD,var(--accent));border:none;
  border-radius:12px;color:#fff;font-size:15px;font-weight:700;cursor:pointer}

/* 모달 오버레이 */
.modal-bg{position:fixed;inset:0;background:rgba(0,0,0,.7);
  display:flex;align-items:center;justify-content:center;
  z-index:100;opacity:0;pointer-events:none;transition:opacity .2s}
.modal-bg.show{opacity:1;pointer-events:auto}
.modal{background:var(--s1);border:1px solid var(--border);border-radius:18px;
  padding:24px 20px;width:calc(100% - 48px);max-width:320px}
.modal-title{font-size:17px;font-weight:800;margin-bottom:8px;letter-spacing:-.3px}
.modal-desc{font-size:12px;color:var(--txt2);line-height:1.6;margin-bottom:20px}
.modal-btns{display:grid;grid-template-columns:1fr 1fr;gap:8px}
.mbtn{padding:12px;border:none;border-radius:11px;font-size:13px;
  font-weight:700;cursor:pointer}
.mbtn-cancel{background:var(--s2);color:var(--txt2)}
.mbtn-cancel:active{opacity:.7}
.mbtn-danger{background:rgba(255,59,92,.15);border:1.5px solid rgba(255,59,92,.4);color:var(--red)}
.mbtn-danger:active{opacity:.7}

/* toast */
.toast{position:fixed;bottom:calc(var(--b)+80px);left:50%;
  transform:translateX(-50%) translateY(10px);background:var(--s2);
  border:1px solid var(--border);border-radius:11px;padding:8px 14px;
  font-size:12px;font-weight:600;color:var(--txt);opacity:0;
  transition:all .22s;pointer-events:none;white-space:nowrap;z-index:999}
.toast.show{opacity:1;transform:translateX(-50%) translateY(0)}

/* animations */
@keyframes cardIn{from{opacity:0;transform:translateY(12px) scale(.97)}to{opacity:1;transform:none}}
.face-front{animation:cardIn .2s ease}
.face-back{animation:none !important;visibility:hidden}
.card-inner.flip .face-back{visibility:visible}
@keyframes shake{0%,100%{transform:translateX(0)}25%{transform:translateX(-6px)}75%{transform:translateX(6px)}}
.shake .face-front{animation:shake .28s ease}

/* scrollbar */
::-webkit-scrollbar{width:2px}::-webkit-scrollbar-thumb{background:var(--border);border-radius:2px}
</style>
</head>
<body>

<!-- ══ HOME ══ -->
<div id="home" class="scr on">
  <div class="hdr">
    <div class="logo">
      <div class="logo-box">T</div>
      <div><div class="logo-title">TOEIC 보카</div><div class="logo-sub">ETS 기출 · DAY 1~30 완전판</div></div>
    </div>
    <div class="streak">🔥 <span id="streakN">0</span>일</div>
  </div>

  <div class="stats">
    <div class="stat"><div class="stat-v" id="stLearned">0</div><div class="stat-l">학습 완료</div></div>
    <div class="stat"><div class="stat-v" id="stDue">0</div><div class="stat-l">복습 예정</div></div>
    <div class="stat"><div class="stat-v" id="stMastered">0</div><div class="stat-l">마스터</div></div>
  </div>

  <div class="daily">
    <div class="daily-row">
      <span class="daily-lbl">오늘 목표</span>
      <div style="display:flex;align-items:center;gap:6px">
        <div style="display:flex;gap:3px" id="goalSegs">
          <div class="gseg" onclick="setGoal(50)">50</div>
          <div class="gseg" onclick="setGoal(100)">100</div>
          <div class="gseg" onclick="setGoal(150)">150</div>
          <div class="gseg" onclick="setGoal(200)">200</div>
        </div>
        <span class="daily-cnt" id="dailyCnt">0 / 100</span>
      </div>
    </div>
    <div class="track"><div class="fill" id="dailyFill" style="width:0%"></div></div>
  </div>

  <button class="rev-btn" onclick="startReview()">
    📅 오늘 복습 카드 <span class="badge" id="dueBadge">0</span>
  </button>
  <button class="all-btn" onclick="startAll()">⚡ 전체 이어서 학습하기</button>
  <button class="reset-btn" onclick="showResetModal()">🗑 학습 기록 초기화</button>

  <div class="sec">카테고리별 학습</div>
  <div class="cat-grid" id="catGrid"></div>
</div>

<!-- ══ STUDY ══ -->
<div id="study" class="scr">
  <div class="s-hdr">
    <div class="back" onclick="goHome()">‹</div>
    <div class="s-meta">
      <div class="s-name" id="deckName">학습</div>
      <div class="s-prog" id="progTxt">0 / 0</div>
    </div>
    <div class="s-streak" id="sesStreak">✓ 0</div>
  </div>
  <div class="prog-bar"><div class="prog-fill" id="progFill" style="width:0%"></div></div>

  <!-- 타이머 설정 -->
  <div class="timer-cfg" id="timerCfg">
    <span class="timer-cfg-lbl">⏱ 제한 시간</span>
    <div class="timer-seg">
      <div class="tseg" onclick="setTimer(3)">3초</div>
      <div class="tseg active" onclick="setTimer(5)">5초</div>
      <div class="tseg" onclick="setTimer(7)">7초</div>
      <div class="tseg" onclick="setTimer(0)">끄기</div>
    </div>
  </div>

  <!-- 자동 뒤집기 토글 -->
  <div class="timer-cfg" id="autoCfg" style="padding:8px 14px">
    <div class="tauto-toggle" onclick="toggleAutoFlip()">
      <div class="toggle-box" id="autoToggle"></div>
      <span id="autoLbl">시간 초과 시 자동으로 뒤집기</span>
    </div>
  </div>

  <div class="card-wrap">
    <div class="card" id="cardEl" onclick="flipCard()">
      <div class="card-inner" id="cardInner">
        <div class="face face-front">
          <div class="day-tag" id="ftag">DAY 1</div>
          <div class="word" id="fword">hold</div>
          <div class="pos" id="fpos">v.</div>
          <!-- 타이머 바 -->
          <div class="timer-wrap" id="timerWrap" style="display:none">
            <div class="timer-track">
              <div class="timer-fill" id="timerFill"></div>
            </div>
            <div class="timer-num" id="timerNum">5.0</div>
          </div>
          <div class="tap-hint" id="tapHint">👆 탭해서 뜻 보기</div>
        </div>
        <div class="face face-back">
          <div class="day-tag" id="btag">DAY 1</div>
          <div class="word" id="bword">hold</div>
          <div class="meaning" id="bmeaning">들다, 잡다</div>
          <div class="ivl-lbl" id="ivlLbl"></div>
        </div>
      </div>
    </div>
    <div class="spk-btn" id="spkBtn" onclick="speak()">🔊</div>
  </div>

  <div class="ans hide" id="ansBtns">
    <button class="abtn again" onclick="answer(false)">✕ Again<small>다시 학습</small></button>
    <button class="abtn good"  onclick="answer(true)">✓ Good<small>다음에 복습</small></button>
  </div>
</div>

<!-- ══ DONE ══ -->
<div id="done" class="scr">
  <div class="done-ico" id="doneIco">🎉</div>
  <div class="done-t" id="doneT">세션 완료!</div>
  <div class="done-s" id="doneS">오늘도 수고했어요!</div>
  <div class="done-box">
    <div class="drow"><span class="dlbl">학습한 카드</span><span class="dval" id="dCards">0</span></div>
    <div class="drow"><span class="dlbl">정확도</span><span class="dval" style="color:var(--green)" id="dAcc">0%</span></div>
    <div class="drow"><span class="dlbl">연속 정답</span><span class="dval" style="color:var(--gold)" id="dStreak">0</span></div>
  </div>
  <button class="home-btn" onclick="goHome()">홈으로 돌아가기</button>
</div>

<!-- ══ 초기화 모달 ══ -->
<div class="modal-bg" id="resetModal">
  <div class="modal">
    <div class="modal-title">⚠️ 학습 기록 초기화</div>
    <div class="modal-desc">모든 학습 기록, 복습 주기, 연속 학습일이<br>완전히 삭제됩니다. 되돌릴 수 없어요.</div>
    <div class="modal-btns">
      <button class="mbtn mbtn-cancel" onclick="hideResetModal()">취소</button>
      <button class="mbtn mbtn-danger" onclick="confirmReset()">초기화</button>
    </div>
  </div>
</div>

<div class="toast" id="toast"></div>

<script>
// ═══════════════════════════════════════
// WORD DATA  DAY 1 ~ 15
// ═══════════════════════════════════════
const CATS = [
  { id:'lc_photo', name:'LC 사진묘사', tag:'LC · DAY1-2', cls:'c0',

// SM-2 간격 반복 + localStorage
// ═══════════════════════════════════════
const LS_KEY = 'toeic_v2';
let GOAL = parseInt(localStorage.getItem('toeic_goal')||'100');

function loadDB(){
  try{ return JSON.parse(localStorage.getItem(LS_KEY)||'{}'); }catch(e){ return {}; }
}
function saveDB(db){ localStorage.setItem(LS_KEY, JSON.stringify(db)); }

function getCard(db, id){
  return db[id] || { ef:2.5, interval:0, reps:0, due:0, seen:false };
}

function sm2(card, good){
  let {ef,interval,reps} = card;
  if(!good){ reps=0; interval=1; ef=Math.max(1.3, ef-0.2); }
  else {
    if(reps===0) interval=1;
    else if(reps===1) interval=3;
    else interval=Math.round(interval*ef);
    ef=Math.max(1.3, ef+0.1-0.08*0);
    reps++;
  }
  const due = Date.now() + interval*24*60*60*1000;
  return {ef, interval, reps, due, seen:true};
}

function isMastered(c){ return c.seen && c.interval >= 21; }
function isDue(c){ return c.seen && Date.now() >= c.due; }

function todayKey(){ return new Date().toDateString(); }

function refreshHome(){
  const db = loadDB();
  const allW = CATS.flatMap(c=>c.words);
  const learned = allW.filter(w=>loadDB()[w.w]?.seen).length;
  const due = allW.filter(w=>{ const c=getCard(db,w.w); return isDue(c); }).length;
  const mastered = allW.filter(w=>isMastered(getCard(db,w.w))).length;

  document.getElementById('stLearned').textContent = learned;
  document.getElementById('stDue').textContent = due;
  document.getElementById('stMastered').textContent = mastered;
  document.getElementById('dueBadge').textContent = due;

  // daily
  const stored = JSON.parse(localStorage.getItem('toeic_daily')||'{"date":"","count":0,"streak":0}');
  if(stored.date !== todayKey()){ todayCount=0; }
  else todayCount = stored.count;
  streak = (stored.streak)||0;

  document.getElementById('dailyCnt').textContent = `${todayCount} / ${GOAL}`;
  const pct = Math.min(100, (todayCount/GOAL)*100);
  document.getElementById('dailyFill').style.width = pct+'%';
  document.getElementById('streakN').textContent = streak;

  // category cards
  const grid = document.getElementById('catGrid');
  grid.innerHTML = CATS.map((cat,i)=>{
    const total = cat.words.length;
    const done = cat.words.filter(w=>getCard(db,w.w).seen).length;
    const pct = Math.round((done/total)*100);
    return `<div class="cc ${cat.cls}" onclick="startCat('${cat.id}')">
      <div class="cc-tag">${cat.tag}</div>
      <div class="cc-name">${cat.name}</div>
      <div class="cc-row">
        <div class="cc-trk"><div class="cc-bar" style="width:${pct}%"></div></div>
        <span class="cc-cnt">${done}/${total}</span>
      </div>
    </div>`;
  }).join('');
}

// STUDY SESSION

function buildDeck(words){
  const db = loadDB();
  const unseen = words.filter(w=>!getCard(db,w.w).seen);
  const due    = words.filter(w=>{ const c=getCard(db,w.w); return c.seen && isDue(c); });
  const rest   = words.filter(w=>{ const c=getCard(db,w.w); return c.seen && !isDue(c); });
  const sh = a=>a.sort(()=>Math.random()-.5);
  return [...sh(unseen), ...sh(due), ...sh(rest)].slice(0, GOAL);
}

function startCat(id){
  const cat = CATS.find(c=>c.id===id);
  startSession(cat.words, cat.name);
}
function startAll(){
  const words = CATS.flatMap(c=>c.words);
  startSession(words, '전체 학습');
}
function startReview(){
  const db = loadDB();
  const dueW = CATS.flatMap(c=>c.words).filter(w=>isDue(getCard(db,w.w)));
  if(!dueW.length){ toast('복습 예정 카드가 없어요! 🎉'); return; }
  startSession(dueW, '오늘 복습');
}

function startSession(words, name){
  deck = buildDeck(words);
  if(!deck.length){ toast('학습할 카드가 없어요!'); return; }
  idx=0; flipped=false; sesGood=0; sesTotal=0; sesStreak=0;
  newCards=0; goalReached=false;
  document.getElementById('deckName').textContent = name;
  document.getElementById('sesStreak').textContent = '✓ 0';
  showCard();
  show('study');
}

// ── 타이머 설정 ──────────────────────────
function setTimer(sec){
  timerSec = sec;
  document.querySelectorAll('.tseg').forEach(el=>{
    el.classList.toggle('active', parseInt(el.textContent)===sec || (sec===0 && el.textContent==='끄기'));
  });
  const wrap = document.getElementById('timerWrap');
  const autoCfg = document.getElementById('autoCfg');
  if(sec===0){
    wrap.style.display='none';
    autoCfg.style.display='none';
  } else {
    wrap.style.display='';
    autoCfg.style.display='';
  }
  localStorage.setItem('toeic_timer', JSON.stringify({sec, auto:autoFlip}));
}

function toggleAutoFlip(){
  autoFlip = !autoFlip;
  document.getElementById('autoToggle').classList.toggle('on', autoFlip);
  document.getElementById('autoLbl').textContent = autoFlip
    ? '시간 초과 시 자동으로 뒤집기 ✓'
    : '시간 초과 시 자동으로 뒤집기';
  localStorage.setItem('toeic_timer', JSON.stringify({sec:timerSec, auto:autoFlip}));
}

function startTimer(){
  stopTimer();
  if(timerSec === 0 || flipped) return;
  timerEnd = performance.now() + timerSec * 1000;

  const fill = document.getElementById('timerFill');
  const num  = document.getElementById('timerNum');
  fill.classList.remove('danger');
  num.classList.remove('danger');

  function tick(){
    const now = performance.now();
    const left = Math.max(0, timerEnd - now);
    const pct  = (left / (timerSec * 1000)) * 100;
    const secs = (left / 1000).toFixed(1);

    fill.style.width = pct + '%';
    num.textContent  = secs;

    const isDanger = left < timerSec * 1000 * 0.35;
    fill.classList.toggle('danger', isDanger);
    num.classList.toggle('danger',  isDanger);

    if(left <= 0){
      fill.style.width = '0%';
      num.textContent  = '0.0';
      if(autoFlip && !flipped){
        // 자동 뒤집기: 뒤집고 0.55초 뒤 Again 자동 선택
        flipCard();
        setTimeout(()=>{ if(flipped) answer(false); }, 1000);
      }
      return; // 타이머 종료
    }
    timerRAF = requestAnimationFrame(tick);
  }
  timerRAF = requestAnimationFrame(tick);
}

function stopTimer(){
  if(timerRAF){ cancelAnimationFrame(timerRAF); timerRAF=null; }
}

function loadTimerSettings(){
  try{
    const s = JSON.parse(localStorage.getItem('toeic_timer')||'{}');
    if(s.sec !== undefined) setTimer(s.sec);
    if(s.auto) toggleAutoFlip();
  }catch(e){}
}

// ── 기존 showCard 교체 ───────────────────
function showCard(){
  const card = deck[idx];
  flipped = false;
  stopTimer();
  document.getElementById('cardInner').classList.remove('flip');
  document.getElementById('ansBtns').classList.add('hide');

  document.getElementById('ftag').textContent = card.d;
  document.getElementById('fword').textContent = card.w;
  document.getElementById('fpos').textContent = card.p;
  document.getElementById('btag').textContent = card.d;
  document.getElementById('bword').textContent = card.w;
  document.getElementById('bmeaning').textContent = card.m;

  const db = loadDB();
  const c = getCard(db, card.w);
  document.getElementById('ivlLbl').textContent = c.seen
    ? `복습 주기: ${c.interval}일 · 정확도 인수: ${c.ef.toFixed(1)}`
    : '처음 보는 단어';

  // 앞면 애니메이션 강제 재시작
  const front = document.querySelector('.face-front');
  front.style.animation = 'none';
  front.offsetHeight;
  front.style.animation = '';

  // progress
  const pct = Math.round((idx/deck.length)*100);
  document.getElementById('progFill').style.width = pct+'%';
  document.getElementById('progTxt').textContent = `${idx} / ${deck.length}`;

  // 타이머 시작
  startTimer();

  // auto TTS
  setTimeout(()=>speak(), 200);
}

function flipCard(){
  if(flipped) return;
  flipped=true;
  stopTimer();
  document.getElementById('cardInner').classList.add('flip');
  document.getElementById('ansBtns').classList.remove('hide');
}

function speak(){
  const card = deck[idx];
  if(!card) return;
  const u = new SpeechSynthesisUtterance(card.w);
  u.lang='en-US'; u.rate=0.9; u.pitch=1;
  speechSynthesis.cancel();
  speechSynthesis.speak(u);
}

function answer(good){
  if(!flipped) flipCard();
  const card = deck[idx];
  const db = loadDB();
  const oldCard = getCard(db, card.w);
  db[card.w] = sm2(oldCard, good);
  saveDB(db);

  sesTotal++;
  if(good){ sesGood++; sesStreak++; newCards++; }
  else { sesStreak=0; }
  document.getElementById('sesStreak').textContent = `✓ ${sesStreak}`;

  bumpDaily();

  // 오늘 목표 달성 체크
  const stored = JSON.parse(localStorage.getItem('toeic_daily')||'{"count":0}');
  if(stored.count >= GOAL && !goalReached){
    goalReached = true;
    stopTimer();
    showGoalComplete();
    return;
  }

  if(!good){
    // 진짜 안키 방식: 5~10개 뒤에 재등장
    const el = document.getElementById('cardEl');
    el.classList.add('shake');
    setTimeout(()=>el.classList.remove('shake'), 350);
    const reinsert = deck.splice(idx, 1)[0];
    const gap = 5 + Math.floor(Math.random() * 6); // 5~10
    const pos = Math.min(deck.length, idx + gap);
    deck.splice(pos, 0, reinsert);
    // idx 그대로 — splice 후 다음 카드가 idx 위치로 올라옴
  } else {
    idx++;
  }

  // 덱 끝 도달 (Again 루프 포함 안전 처리)
  if(idx >= deck.length){
    showDone();
  } else {
    showCard();
  }
}

function bumpDaily(){
  const stored = JSON.parse(localStorage.getItem('toeic_daily')||'{"date":"","count":0,"streak":0}');
  const today = todayKey();
  if(stored.date !== today){
    // new day
    const yesterday = new Date(); yesterday.setDate(yesterday.getDate()-1);
    const newStreak = stored.date===yesterday.toDateString() ? (stored.streak||0)+1 : 1;
    localStorage.setItem('toeic_daily', JSON.stringify({date:today, count:1, streak:newStreak}));
  } else {
    stored.count++;
    localStorage.setItem('toeic_daily', JSON.stringify(stored));
  }
}

function showGoalComplete(){
  const acc = sesTotal ? Math.round((sesGood/sesTotal)*100) : 0;
  document.getElementById('doneIco').textContent = '🎯';
  document.getElementById('doneT').textContent = `오늘 목표 ${GOAL}단어 완주!`;
  document.getElementById('doneSub').textContent = '오늘 학습을 마쳤어요. 내일 또 만나요 👋';
  document.getElementById('dCards').textContent = sesTotal;
  document.getElementById('dAcc').textContent = acc+'%';
  document.getElementById('dStreak').textContent = sesStreak;
  show('done');
  // 2.5초 뒤 자동으로 홈으로 이동
  setTimeout(()=>goHome(), 2500);
}

function showDone(){
  const acc = sesTotal ? Math.round((sesGood/sesTotal)*100) : 0;
  document.getElementById('doneIco').textContent = acc>=80?'🎉':acc>=50?'💪':'📚';
  document.getElementById('doneT').textContent = acc>=80?'훌륭해요!':acc>=50?'잘 하고 있어요!':'더 연습해봐요!';
  document.getElementById('doneSub').textContent = `정확도 ${acc}%로 완료했어요.`;
  document.getElementById('dCards').textContent = sesTotal;
  document.getElementById('dAcc').textContent = acc+'%';
  document.getElementById('dStreak').textContent = sesStreak;
  show('done');
}

function goHome(){
  speechSynthesis.cancel();
  show('home');
  refreshHome();
}

syncGoalSegs();

function setGoal(n){
  GOAL = n;
  localStorage.setItem('toeic_goal', String(n));
  syncGoalSegs();
  refreshHome();
}

function syncGoalSegs(){
  document.querySelectorAll('.gseg').forEach(el=>{
    el.classList.toggle('active', parseInt(el.textContent) === GOAL);
  });
}

// ── 초기화 ──────────────────────────────
function showResetModal(){
  document.getElementById('resetModal').classList.add('show');
}
function hideResetModal(){
  document.getElementById('resetModal').classList.remove('show');
}
function confirmReset(){
  localStorage.removeItem(LS_KEY);
  localStorage.removeItem('toeic_daily');
  hideResetModal();
  refreshHome();
  toast('✅ 학습 기록이 초기화됐어요!');
}
</script>
</body>
</html>
